<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Funksjoner med returverdi</title>
  </head>
  <body>
    <div id="mainDiv"></div>
    <button onclick="show('blue', 'hallo hverdan', 30)">knapp</button>
    <button onclick="show('pink', 'Get Academy', 30)">knapp</button>
    <button onclick="show('', '')">reset</button>

    <script>
      function show(color, text, fontSize) {
        document.getElementById("mainDiv").innerHTML = `
            <div ${createStyle(color, fontSize)}>${text} </div>
            `;
      }

      function createStyle(color, fontSize, textcolor) {
        return `style="${createBackgroundColor(color)}${createFontSize(fontSize)} ${createTextColor(textcolor)}"`;
      }
      function createBackgroundColor(color) {
        return `background-color: ${color};`;
      }
      function createFontSize(fontSize) {
        return `font-size: ${fontSize}px;`;
      }

      function createTextColor(textcolor) {
        return `color: ${textcolor};`;
      }
    </script>
  </body>
</html>
